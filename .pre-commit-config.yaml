# .pre-commit-config.yaml
default_language_version:
  python: python3

repos:
  # ── Core hygiene ──────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: ^skillsbench_tasks/
      - id: mixed-line-ending
        args: ['--fix=lf']

  # ── Python: Ruff (thay thế black + flake8 + isort) ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^skillsbench_tasks/
      - id: ruff-format
        exclude: ^skillsbench_tasks/

  # ── Markdown lint ──────────────────────────────────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint-fix
        args: ['--disable', 'MD013', 'MD033', 'MD041']
        # MD013 = line length (tắt vì skill files dài)
        # MD033 = inline HTML (tắt vì có code blocks)
        # MD041 = first line heading (tắt vì SKILL.md không cần)
