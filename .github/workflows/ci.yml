name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight CI runs when a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: backend pytest (demo-app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "fastapi>=0.135" \
            "uvicorn[standard]>=0.42" \
            "pydantic>=2.12" \
            "httpx>=0.28" \
            "pytest>=8"

      - name: Run backend suite
        working-directory: demo-app/backend
        run: pytest -q

  frontend-typecheck:
    name: frontend tsc (demo-app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: demo-app/frontend/pnpm-lock.yaml

      - name: Install
        working-directory: demo-app/frontend
        run: pnpm install --frozen-lockfile

      - name: Type-check
        working-directory: demo-app/frontend
        run: pnpm exec tsc --noEmit

  pipeline-tests:
    name: pipeline pytest (distillation_v2)
    runs-on: ubuntu-latest
    continue-on-error: true  # legacy test_rollback.py has known API drift
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pipeline deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "anthropic" "openai" "python-dotenv" \
            "click>=8" "rich>=13" "pyyaml>=6" \
            "python-docx>=1.1" "pdf2image>=1.17" "pillow>=10" \
            "pytest>=8"

      - name: Run pipeline suite
        run: pytest distillation_v2/tests/ -q
