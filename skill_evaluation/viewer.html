<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Evaluation Log Viewer</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --error: #f85149;
            --thinking: #a371f7;
            --tool: #39d353;
            --tool-result: #58a6ff;
            --text-block: #ffa657;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: auto;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar - File Tree */
        .sidebar {
            width: 320px;
            min-width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar-actions {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.9; }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .skill-group {
            margin-bottom: 8px;
        }

        .skill-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .skill-header:hover {
            background: var(--border);
        }

        .skill-icon {
            transition: transform 0.2s;
            font-size: 10px;
        }

        .skill-icon.expanded {
            transform: rotate(90deg);
        }

        .skill-name {
            flex: 1;
            font-weight: 500;
            font-size: 13px;
        }

        .skill-stats {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .skill-tests {
            margin-left: 20px;
            margin-top: 4px;
        }

        .test-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .test-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .test-item.active {
            background: rgba(88, 166, 255, 0.15);
            border-left: 2px solid var(--accent);
        }

        .test-status {
            font-size: 14px;
        }

        .test-id {
            color: var(--text-secondary);
            flex: 1;
        }

        /* Main Content */
        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: auto;
            height: 100vh;
        }

        #mainContent {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: auto;
            min-height: 0;
        }

        .main-header {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .header-info h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-success {
            background: rgba(63, 185, 80, 0.15);
            color: var(--success);
        }

        .status-error {
            background: rgba(248, 81, 73, 0.15);
            color: var(--error);
        }

        .log-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: var(--bg-primary);
            min-height: 0;
        }

        /* Log Blocks */
        .log-block {
            margin-bottom: 16px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .block-system {
            background: rgba(139, 148, 158, 0.1);
            border-left: 3px solid var(--text-secondary);
        }

        .block-thinking {
            background: rgba(163, 113, 247, 0.1);
            border-left: 3px solid var(--thinking);
        }

        .block-tool-use {
            background: rgba(57, 211, 83, 0.1);
            border-left: 3px solid var(--tool);
        }

        .block-tool-result {
            background: rgba(88, 166, 255, 0.1);
            border-left: 3px solid var(--tool-result);
        }

        .block-text {
            background: rgba(255, 166, 87, 0.08);
            border-left: 3px solid var(--text-block);
        }

        .block-result {
            background: rgba(63, 185, 80, 0.1);
            border-left: 3px solid var(--success);
        }

        .block-result-error {
            background: rgba(248, 81, 73, 0.1);
            border-left: 3px solid var(--error);
        }

        .block-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
            font-size: 12px;
        }

        .block-header:hover {
            background: rgba(0,0,0,0.4);
        }

        .block-type {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .block-system .block-type { color: var(--text-secondary); }
        .block-thinking .block-type { color: var(--thinking); }
        .block-tool-use .block-type { color: var(--tool); }
        .block-tool-result .block-type { color: var(--tool-result); }
        .block-text .block-type { color: var(--text-block); }
        .block-result .block-type { color: var(--success); }
        .block-result-error .block-type { color: var(--error); }

        .block-content {
            padding: 12px;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 500px;
            overflow-y: auto;
        }

        .block-content.collapsed {
            display: none;
        }

        /* JSON Syntax */
        .json-key { color: #79c0ff; }
        .json-string { color: #a5d6ff; }
        .json-number { color: #7ee787; }
        .json-boolean { color: #ff7b72; }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border);
        }

        /* Summary Panel */
        .summary-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .summary-row {
            display: flex;
            gap: 24px;
            margin-bottom: 12px;
        }

        .summary-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .summary-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .summary-value {
            font-size: 14px;
            font-weight: 500;
        }

        .summary-prompt {
            margin-top: 12px;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Stats */
        .stats-bar {
            display: flex;
            gap: 16px;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            margin-top: 12px;
        }

        /* Output Files Panel */
        .output-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .output-header {
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            font-size: 13px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        .output-files {
            padding: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .output-file {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .output-file:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        .output-icon {
            font-size: 16px;
        }

        .output-name {
            font-weight: 500;
            font-size: 13px;
        }

        .output-ext {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .stat-item {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .stat-item span {
            color: var(--text-primary);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>📁 Log Files</h2>
            </div>

            <div class="sidebar-actions">
                <button class="btn" onclick="document.getElementById('fileInput').click()">
                    📂 Open Logs Folder
                </button>
                <input type="file" id="fileInput" webkitdirectory directory multiple style="display:none" onchange="handleFiles(this.files)">
            </div>

            <div class="file-tree" id="fileTree">
                <div class="empty-state" style="padding: 20px;">
                    <p>No logs loaded</p>
                    <p style="font-size: 12px; margin-top: 8px;">Click "Open Logs Folder" to load</p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main">
            <div id="mainContent">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <h3>Select a log to view</h3>
                    <p>Choose a test from the sidebar to view its log</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let files = {};
        let currentLog = null;
        let expandedSkills = [];

        function handleFiles(fileList) {
            files = {};

            // Find index.json or build from files
            let indexFile = null;
            let logFiles = [];
            let fileMap = {}; // Map path -> File object

            for (let file of fileList) {
                const path = file.webkitRelativePath || file.name;
                fileMap[path] = file;

                if (path.includes('index.json')) {
                    indexFile = file;
                } else if (path.endsWith('.jsonl')) {
                    logFiles.push(path);
                }
            }

            if (indexFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);

                        // Load all jsonl files into memory
                        let loadedCount = 0;
                        let totalTests = 0;

                        // First count total tests
                        for (let eval of data.evaluations || []) {
                            totalTests += eval.test_logs.length;
                        }

                        // Handle case with no tests
                        if (totalTests === 0) {
                            renderTree();
                            return;
                        }

                        // Then load each file
                        for (let eval of data.evaluations || []) {
                            const skill = eval.skill;
                            files[skill] = [];

                            for (let t of eval.test_logs) {
                                // t.file is like "algorithmic-art/tc_01.jsonl"
                                // webkitRelativePath might be "logs/algorithmic-art/tc_01.jsonl" or just "algorithmic-art/tc_01.jsonl"
                                const fileName = t.file.split('/').pop();
                                const fullPath = 'logs/' + t.file;
                                let fileObj = fileMap['logs/' + t.file] ||
                                              fileMap[t.file] ||
                                              fileMap[Object.keys(fileMap).find(k => k.endsWith(fileName))];

                                if (fileObj) {
                                    // Read file into memory - use IIFE to capture correct values
                                    (function(testInfo, fileP) {
                                        const fileReader = new FileReader();
                                        fileReader.onload = function(e) {
                                            const content = e.target.result;
                                            files[skill].push({
                                                test_id: testInfo.test_id,
                                                exit_code: testInfo.exit_code,
                                                path: fileP,
                                                content: content
                                            });
                                            loadedCount++;

                                            // When all loaded, render tree
                                            if (loadedCount === totalTests) {
                                                renderTree();
                                            }
                                        };
                                        fileReader.readAsText(fileObj);
                                    })(t, fullPath);
                                } else {
                                    // No file found, store metadata only
                                    (function(testInfo) {
                                        files[skill].push({
                                            test_id: testInfo.test_id,
                                            exit_code: testInfo.exit_code,
                                            path: testInfo.file,
                                            content: null
                                        });
                                        loadedCount++;
                                        if (loadedCount === totalTests) {
                                            renderTree();
                                        }
                                    })(t);
                                }
                            }
                        }
                    } catch (err) {
                        console.error('Error parsing index.json:', err);
                    }
                };
                reader.readAsText(indexFile);
            } else if (logFiles.length > 0) {
                // Build from log files without index.json
                for (let path of logFiles) {
                    const parts = path.split('/');
                    const skill = parts[parts.length - 2] || 'unknown';
                    const testId = parts[parts.length - 1].replace('.jsonl', '');

                    if (!files[skill]) files[skill] = [];
                    files[skill].push({
                        test_id: testId,
                        file: fileMap[path],
                        path: path,
                        exit_code: null
                    });
                }
                renderTree();
            }
        }

        function buildTreeFromIndex(data) {
            files = {};
            for (let eval of data.evaluations || []) {
                const skill = eval.skill;
                files[skill] = eval.test_logs.map(t => ({
                    test_id: t.test_id,
                    exit_code: t.exit_code,
                    path: t.file,
                    timestamp: t.timestamp
                }));
            }

            // Auto expand first skill
            const skillNames = Object.keys(files);
            if (skillNames.length > 0) {
                expandedSkills = [skillNames[0]];
            }

            renderTree();
        }

        function renderTree() {
            const tree = document.getElementById('fileTree');

            if (Object.keys(files).length === 0) {
                tree.innerHTML = '<div class="empty-state" style="padding: 20px;"><p>No logs found</p></div>';
                return;
            }

            let html = '';
            for (let skill in files) {
                const tests = files[skill];
                const passed = tests.filter(t => t.exit_code === 0).length;
                const isExpanded = expandedSkills.includes(skill);

                html += `
                    <div class="skill-group">
                        <div class="skill-header" onclick="toggleSkill('${skill}')">
                            <span class="skill-icon ${isExpanded ? 'expanded' : ''}">▶</span>
                            <span class="skill-name">${skill}</span>
                            <span class="skill-stats">${passed}/${tests.length} ✅</span>
                        </div>
                `;

                if (isExpanded) {
                    html += '<div class="skill-tests">';
                    for (let test of tests) {
                        const status = test.exit_code === 0 ? '✅' : (test.exit_code ? '❌' : '⏳');
                        html += `
                            <div class="test-item" onclick="loadLog('${skill}', '${test.test_id}')">
                                <span class="test-status">${status}</span>
                                <span class="test-id">${test.test_id}</span>
                            </div>
                        `;
                    }
                    html += '</div>';
                }

                html += '</div>';
            }

            tree.innerHTML = html;
        }

        function toggleSkill(skill) {
            if (expandedSkills.includes(skill)) {
                expandedSkills = expandedSkills.filter(s => s !== skill);
            } else {
                expandedSkills.push(skill);
            }
            renderTree();
        }

        async function loadLog(skill, testId) {
            // Find the file
            const tests = files[skill];
            const test = tests.find(t => t.test_id === testId);

            if (!test) return;

            // Highlight current
            document.querySelectorAll('.test-item').forEach(el => el.classList.remove('active'));

            // Use content from memory if available
            if (test.content) {
                parseAndRenderLog(test.content, skill, testId);
            } else if (test.file) {
                // File from input
                const reader = new FileReader();
                reader.onload = function(e) {
                        parseAndRenderLog(e.target.result, skill, testId);
                };
                reader.readAsText(test.file);
            } else if (test.path) {
                // Try to fetch
                try {
                    const response = await fetch(test.path);
                    const text = await response.text();
                    parseAndRenderLog(text, skill, testId);
                } catch (err) {
                    console.error('Error loading log:', err);
                    document.getElementById('mainContent').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">❌</div>
                            <h3>Error loading log</h3>
                            <p>${err.message}</p>
                        </div>
                    `;
                }
            }
        }

        function parseAndRenderLog(text, skill, testId) {
            const lines = text.trim().split('\n');
            const entries = lines.map(line => {
                try {
                    return JSON.parse(line);
                } catch {
                    return null;
                }
            }).filter(e => e !== null);

            if (entries.length === 0) {
                showEmpty('Log file is empty');
                return;
            }

            // First entry is metadata
            const metadata = entries[0];

            // Parse entries - also extract output files
            const blocks = [];
            const outputFiles = [];

            for (let i = 1; i < entries.length; i++) {
                const entry = entries[i];
                const type = entry.type;

                // Extract output files from Write tool
                if (type === 'assistant') {
                    const message = entry.message || {};
                    const content = message.content || [];

                    for (let item of content) {
                        if (item.type === 'tool_use' && item.name === 'Write') {
                            const input = item.input || {};
                            if (input.file_path) {
                                const fileName = input.file_path.split('/').pop();
                                const ext = fileName.split('.').pop().toLowerCase();
                                let icon = '📄';
                                if (['html', 'htm'].includes(ext)) icon = '🌐';
                                else if (['js', 'ts', 'jsx', 'tsx'].includes(ext)) icon = '📜';
                                else if (['css', 'scss', 'less'].includes(ext)) icon = '🎨';
                                else if (['json'].includes(ext)) icon = '📋';
                                else if (['md', 'markdown'].includes(ext)) icon = '📝';
                                else if (['docx', 'doc'].includes(ext)) icon = '📃';
                                else if (['pdf'].includes(ext)) icon = '📕';
                                else if (['png', 'jpg', 'jpeg', 'gif', 'svg'].includes(ext)) icon = '🖼️';
                                else if (['pptx', 'ppt'].includes(ext)) icon = '📊';
                                else if (['xlsx', 'xls', 'csv'].includes(ext)) icon = '📈';

                                outputFiles.push({
                                    path: input.file_path,
                                    name: fileName,
                                    icon: icon,
                                    ext: ext
                                });
                            }
                        }
                    }
                }

                if (type === 'system') {
                    const model = entry.model || 'N/A';
                    const sessionId = (entry.session_id || '').substring(0, 8);
                    const tools = (entry.tools || []).slice(0, 5).join(', ');

                    blocks.push({
                        type: 'system',
                        class: 'block-system',
                        title: '⚙️ System Init',
                        content: `Model: ${model}\nSession: ${sessionId}...\nTools: ${tools}...`,
                        collapsed: false
                    });
                }

                else if (type === 'assistant') {
                    const message = entry.message || {};
                    const content = message.content || [];

                    for (let item of content) {
                        const itemType = item.type;

                        if (itemType === 'thinking') {
                            let thinking = item.thinking || '';
                            if (thinking.length > 1500) {
                                thinking = thinking.substring(0, 1500) + `\n\n... [${thinking.length - 1500} more characters]`;
                            }

                            blocks.push({
                                type: 'thinking',
                                class: 'block-thinking',
                                title: '🤔 Thinking',
                                content: thinking,
                                collapsed: false
                            });
                        }

                        else if (itemType === 'text') {
                            blocks.push({
                                type: 'text',
                                class: 'block-text',
                                title: '💬 Text Response',
                                content: item.text || '',
                                collapsed: false
                            });
                        }

                        else if (itemType === 'tool_use') {
                            const toolName = item.name || 'unknown';
                            const toolInput = JSON.stringify(item.input || {}, null, 2);

                            blocks.push({
                                type: 'tool_use',
                                class: 'block-tool-use',
                                title: `🔧 Tool: ${toolName}`,
                                content: toolInput,
                                collapsed: false
                            });
                        }
                    }
                }

                else if (type === 'user') {
                    const message = entry.message || {};
                    const content = message.content || [];

                    for (let item of content) {
                        let resultContent = item.content || '';
                        if (typeof resultContent === 'string' && resultContent.length > 1500) {
                            resultContent = resultContent.substring(0, 1500) + `\n\n... [${resultContent.length - 1500} more characters]`;
                        }

                        blocks.push({
                            type: 'tool_result',
                            class: 'block-tool-result',
                            title: '✓ Tool Result',
                            content: resultContent,
                            collapsed: false
                        });
                    }
                }

                else if (type === 'rate_limit_event') {
                    const info = entry.rate_limit_info || {};
                    blocks.push({
                        type: 'rate_limit',
                        class: 'block-system',
                        title: '⚡ Rate Limit',
                        content: `Status: ${info.status || 'unknown'}`,
                        collapsed: true
                    });
                }

                else if (type === 'result') {
                    const subtype = entry.subtype;
                    const isError = entry.is_error;
                    const duration = entry.duration_ms || 0;
                    const cost = entry.total_cost_usd || 0;
                    const resultText = entry.result || '';

                    const resultClass = isError ? 'block-result-error' : 'block-result';
                    const title = isError ? '❌ Result - Error' : '✅ Result - Success';

                    let content = `Duration: ${duration}ms\nCost: $${cost.toFixed(6)}\nError: ${isError}`;
                    if (resultText) {
                        content += `\n\nResult:\n${resultText.substring(0, 1000)}`;
                    }

                    blocks.push({
                        type: 'result',
                        class: resultClass,
                        title: title,
                        content: content,
                        collapsed: false
                    });
                }
            }

            // Count stats
            const stats = {
                thinking: 0,
                toolUse: 0,
                toolResult: 0,
                text: 0
            };

            for (let block of blocks) {
                if (block.type === 'thinking') stats.thinking++;
                else if (block.type === 'tool_use') stats.toolUse++;
                else if (block.type === 'tool_result') stats.toolResult++;
                else if (block.type === 'text') stats.text++;
            }

            // Render
            renderLogContent(metadata, blocks, stats, skill, testId, outputFiles);
        }

        function renderLogContent(metadata, blocks, stats, skill, testId, outputFiles = []) {
            const exitCode = metadata.exit_code;
            const duration = metadata.duration_seconds || 0;
            const timestamp = metadata.timestamp || 'N/A';
            const model = metadata.model || 'N/A';
            const prompt = metadata.prompt || '';

            let html = `
                <div class="main-header">
                    <div class="header-info">
                        <h1>${testId}</h1>
                        <div class="header-meta">
                            <div class="meta-item">
                                <span>📅</span>
                                <span>${new Date(timestamp).toLocaleString()}</span>
                            </div>
                            <div class="meta-item">
                                <span>⏱️</span>
                                <span>${duration.toFixed(2)}s</span>
                            </div>
                            <div class="meta-item">
                                <span>🤖</span>
                                <span>${model}</span>
                            </div>
                        </div>
                    </div>
                    <span class="status-badge ${exitCode === 0 ? 'status-success' : 'status-error'}">
                        ${exitCode === 0 ? '✅ Success' : `❌ Failed (${exitCode})`}
                    </span>
                </div>

                <div class="log-content">
                    <!-- Summary -->
                    <div class="summary-panel">
                        <div class="summary-row">
                            <div class="summary-item">
                                <span class="summary-label">Skill</span>
                                <span class="summary-value">${skill}</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Test ID</span>
                                <span class="summary-value">${testId}</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Model</span>
                                <span class="summary-value">${model}</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Exit Code</span>
                                <span class="summary-value" style="color: ${exitCode === 0 ? 'var(--success)' : 'var(--error)'}">${exitCode}</span>
                            </div>
                        </div>
                        <div class="summary-prompt">
                            <strong>Prompt:</strong> ${prompt}
                        </div>
                        <div class="stats-bar">
                            <div class="stat-item">🤔 <span>${stats.thinking}</span> thinking</div>
                            <div class="stat-item">🔧 <span>${stats.toolUse}</span> tool calls</div>
                            <div class="stat-item">✓ <span>${stats.toolResult}</span> results</div>
                            <div class="stat-item">💬 <span>${stats.text}</span> text blocks</div>
                            <div class="stat-item">📝 <span>${blocks.length}</span> total entries</div>
                        </div>
                    </div>

                    <!-- Output Files -->
                    ${outputFiles.length > 0 ? `
                    <div class="output-panel">
                        <div class="output-header">📦 Output Files (${outputFiles.length})</div>
                        <div class="output-files">
                            ${outputFiles.map(f => `
                                <div class="output-file" onclick="showOutputFileContent('${f.path}')">
                                    <span class="output-icon">${f.icon}</span>
                                    <span class="output-name">${f.name}</span>
                                    <span class="output-ext">.${f.ext}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}

                    <!-- Log Blocks -->
            `;

            for (let block of blocks) {
                const escapedContent = escapeHtml(block.content);
                html += `
                    <div class="log-block ${block.class}">
                        <div class="block-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">
                            <span class="block-type">${block.title}</span>
                            <span>${block.collapsed ? '▼' : '▲'}</span>
                        </div>
                        <div class="block-content ${block.collapsed ? 'collapsed' : ''}">${formatJson(escapedContent)}</div>
                    </div>
                `;
            }

            html += '</div>';

            document.getElementById('mainContent').innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatJson(text) {
            // Try to parse and format as JSON
            try {
                const obj = JSON.parse(text);
                return '<pre>' + JSON.stringify(obj, null, 2) + '</pre>';
            } catch {
                return escapeHtml(text);
            }
        }

        function showOutputFileContent(path) {
            // Simple: prepend output/ to the file name
            const fileName = path.split('/').pop();
            const fullPath = '/Users/soc_036/study_dir/skill_distillation/skill_evaluation/output/' + fileName;

            console.log('Opening:', 'file://' + fullPath);

            // Open directly in browser
            window.open('file://' + fullPath, '_blank');
        }

        function showEmpty(message) {
            document.getElementById('mainContent').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <h3>${message}</h3>
                </div>
            `;
        }

        // Try to load index.json from default location
        fetch('logs/index.json')
            .then(r => r.json())
            .then(data => buildTreeFromIndex(data))
            .catch(() => {});
    </script>
</body>
</html>
