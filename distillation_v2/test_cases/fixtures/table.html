<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Scores</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 20px; background: #f9fafb; }
    h1 { font-size: 1.5rem; margin-bottom: 16px; }
    #sortBtn { padding: 8px 18px; background: #7c3aed; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; margin-bottom: 16px; }
    #sortBtn:hover { background: #6d28d9; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    thead { background: #7c3aed; color: #fff; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #e5e7eb; }
    tbody tr:hover { background: #f3f4f6; }
    td.score { font-weight: bold; }
    .grade-A { color: #16a34a; }
    .grade-B { color: #2563eb; }
    .grade-C { color: #d97706; }
  </style>
</head>
<body>
  <h1>Student Scores</h1>
  <button id="sortBtn">Sort by Score ▲</button>
  <table id="dataTable">
    <thead>
      <tr><th>Name</th><th>Score</th><th>Grade</th></tr>
    </thead>
    <tbody id="tableBody">
      <tr><td>Alice</td><td class="score">87</td><td class="grade-B">B</td></tr>
      <tr><td>Bob</td><td class="score">92</td><td class="grade-A">A</td></tr>
      <tr><td>Carol</td><td class="score">74</td><td class="grade-C">C</td></tr>
      <tr><td>Dave</td><td class="score">95</td><td class="grade-A">A</td></tr>
      <tr><td>Eve</td><td class="score">81</td><td class="grade-B">B</td></tr>
    </tbody>
  </table>
  <script>
    let ascending = true;
    document.getElementById('sortBtn').addEventListener('click', function() {
      const tbody = document.getElementById('tableBody');
      const rows = Array.from(tbody.querySelectorAll('tr'));
      rows.sort(function(a, b) {
        const scoreA = parseInt(a.querySelectorAll('td')[1].textContent);
        const scoreB = parseInt(b.querySelectorAll('td')[1].textContent);
        return ascending ? scoreA - scoreB : scoreB - scoreA;
      });
      rows.forEach(function(row) { tbody.appendChild(row); });
      ascending = !ascending;
      document.getElementById('sortBtn').textContent = ascending ? 'Sort by Score ▲' : 'Sort by Score ▼';
    });
  </script>
</body>
</html>
