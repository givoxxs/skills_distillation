<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Counter App</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background: #f5f5f5; }
    h1 { font-size: 2rem; margin-bottom: 24px; }
    #count { color: #2563eb; font-weight: bold; }
    .controls { display: flex; gap: 12px; }
    button { font-size: 1.2rem; padding: 10px 24px; cursor: pointer; border: 2px solid #333; border-radius: 6px; background: #fff; }
    button:hover { background: #e5e7eb; }
    #inc  { border-color: #16a34a; color: #16a34a; }
    #dec  { border-color: #dc2626; color: #dc2626; }
    #reset{ border-color: #6b7280; color: #6b7280; }
  </style>
</head>
<body>
  <h1>Counter: <span id="count">0</span></h1>
  <div class="controls">
    <button id="inc">Increment</button>
    <button id="dec">Decrement</button>
    <button id="reset">Reset</button>
  </div>
  <script>
    let n = 0;
    const display = document.getElementById('count');
    document.getElementById('inc').addEventListener('click', () => { display.textContent = ++n; });
    document.getElementById('dec').addEventListener('click', () => { display.textContent = --n; });
    document.getElementById('reset').addEventListener('click', () => { n = 0; display.textContent = 0; });
  </script>
</body>
</html>
